<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anmelden – fynnhofmann.com</title>
  <meta name="robots" content="noindex, nofollow">

  <style>
    /* =====================================================
       Enterprise Login – Corporate SSO Style
       Modelled after real enterprise portals (ServiceNow,
       SAP, Workday). Reusable: change branding only.
       ===================================================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: "Segoe UI", -apple-system, BlinkMacSystemFont,
                   "Helvetica Neue", Arial, sans-serif;
      font-size: 14px;
      background: #f3f4f6;
      color: #111827;
    }

    /* ── Layout ──────────────────────────────────────── */
    .login-shell {
      display: flex;
      min-height: 100vh;
    }

    /* ── Left panel ──────────────────────────────────── */
    .login-left {
      flex: 0 0 50%;
      background: #032D42;
      position: relative;
      overflow: hidden;
    }

    /* ── Right panel ─────────────────────────────────── */
    .login-right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 36px;
      background: #fff;
    }

    .login-form-box {
      width: 100%;
      max-width: 340px;
    }

    .login-form-site {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #9ca3af;
      margin-bottom: 10px;
    }

    .login-form-title {
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: -0.015em;
      color: #111827;
      margin-bottom: 6px;
    }

    .login-form-sub {
      font-size: 0.82rem;
      color: #6b7280;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    /* ── Form fields ─────────────────────────────────── */
    .lf-field {
      margin-bottom: 14px;
    }

    .lf-field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: #374151;
      margin-bottom: 5px;
    }

    .lf-input {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.85rem;
      color: #111827;
      background: #f9fafb;
      outline: none;
      transition: border-color .15s, background .15s, box-shadow .15s;
    }

    .lf-input:focus {
      border-color: #032D42;
      background: #fff;
      box-shadow: 0 0 0 2px rgba(3,45,66,0.1);
    }

    .lf-input::placeholder {
      color: #d1d5db;
    }

    .lf-pw-wrap {
      position: relative;
    }

    .lf-pw-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #9ca3af;
      padding: 3px;
      display: flex;
      align-items: center;
      border-radius: 3px;
      transition: color .12s;
    }

    .lf-pw-toggle:hover { color: #374151; }

    /* ── Error / success ────────────────────────────── */
    .lf-msg {
      font-size: 0.78rem;
      min-height: 18px;
      margin: 4px 0 12px;
    }

    .lf-msg.is-err { color: #b91c1c; }
    .lf-msg.is-ok  { color: #15803d; }

    /* ── Submit ──────────────────────────────────────── */
    .lf-submit {
      width: 100%;
      padding: 10px 16px;
      background: #032D42;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }

    .lf-submit:hover  { background: #054467; }
    .lf-submit:disabled { opacity: 0.5; cursor: default; }

    /* ── Footer ──────────────────────────────────────── */
    .lf-sep {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 22px 0;
    }

    .lf-back {
      display: block;
      text-align: center;
      font-size: 0.78rem;
      color: #9ca3af;
      text-decoration: none;
      transition: color .12s;
    }

    .lf-back:hover { color: #374151; }

    /* ── Shake animation ─────────────────────────────── */
    @keyframes lf-shake {
      0%,100% { transform: none; }
      20%,60%  { transform: translateX(-4px); }
      40%,80%  { transform: translateX(4px); }
    }
    .lf-shake { animation: lf-shake .28s ease; }

    /* ── Responsive ──────────────────────────────────── */
    @media (max-width: 760px) {
      .login-left { display: none; }
      .login-right { padding: 40px 24px; background: #f3f4f6; }
      .login-form-box {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 6px;
        padding: 32px 24px;
      }
    }
  </style>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">

  <style>
    .logo-chaos {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }
    .lc {
      position: absolute;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #1d1d1f;
      border-radius: 22%;
      font-family: 'Rubik', sans-serif;
      font-weight: 600;
      color: #fff;
      line-height: 1;
      user-select: none;
    }
  </style>

  <script>
    if (sessionStorage.getItem('fh_auth') === 'fh_authed_2026') {
      document.location.replace('secure/index.html');
    }
  </script>
</head>
<body>

<div class="login-shell">

  <!-- ── Left ────────────────────────────────────────── -->
  <div class="login-left" style="padding:0;overflow:hidden;position:relative;">
    <div class="logo-chaos">
      <!-- size, top%, left%, rotation -->
      <span class="lc" style="width:120px;height:120px;font-size:72px;top:4%;left:8%;transform:rotate(-12deg);opacity:1;">f</span>
      <span class="lc" style="width:44px;height:44px;font-size:26px;top:2%;left:58%;transform:rotate(8deg);opacity:.9;">f</span>
      <span class="lc" style="width:200px;height:200px;font-size:120px;top:14%;left:38%;transform:rotate(5deg);opacity:.85;">f</span>
      <span class="lc" style="width:28px;height:28px;font-size:16px;top:18%;left:6%;transform:rotate(-6deg);opacity:.7;">f</span>
      <span class="lc" style="width:72px;height:72px;font-size:44px;top:28%;left:62%;transform:rotate(-18deg);opacity:.95;">f</span>
      <span class="lc" style="width:160px;height:160px;font-size:96px;top:38%;left:-4%;transform:rotate(14deg);opacity:.8;">f</span>
      <span class="lc" style="width:36px;height:36px;font-size:22px;top:36%;left:52%;transform:rotate(3deg);opacity:.75;">f</span>
      <span class="lc" style="width:56px;height:56px;font-size:34px;top:52%;left:72%;transform:rotate(-9deg);opacity:.9;">f</span>
      <span class="lc" style="width:88px;height:88px;font-size:54px;top:57%;left:28%;transform:rotate(20deg);opacity:.85;">f</span>
      <span class="lc" style="width:24px;height:24px;font-size:14px;top:62%;left:8%;transform:rotate(-4deg);opacity:.6;">f</span>
      <span class="lc" style="width:140px;height:140px;font-size:84px;top:66%;left:48%;transform:rotate(-15deg);opacity:.9;">f</span>
      <span class="lc" style="width:48px;height:48px;font-size:28px;top:72%;left:14%;transform:rotate(11deg);opacity:.8;">f</span>
      <span class="lc" style="width:32px;height:32px;font-size:19px;top:80%;left:68%;transform:rotate(7deg);opacity:.7;">f</span>
      <span class="lc" style="width:96px;height:96px;font-size:58px;top:82%;left:2%;transform:rotate(-22deg);opacity:.85;">f</span>
      <span class="lc" style="width:64px;height:64px;font-size:38px;top:88%;left:38%;transform:rotate(16deg);opacity:.9;">f</span>
      <span class="lc" style="width:20px;height:20px;font-size:12px;top:91%;left:78%;transform:rotate(-3deg);opacity:.55;">f</span>
      <span class="lc" style="width:112px;height:112px;font-size:67px;top:5%;left:-6%;transform:rotate(9deg);opacity:.6;">f</span>
      <span class="lc" style="width:40px;height:40px;font-size:24px;top:46%;left:40%;transform:rotate(-13deg);opacity:.75;">f</span>
    </div>
  </div>

  <!-- ── Right ───────────────────────────────────────── -->
  <div class="login-right">
    <div class="login-form-box" id="loginWrap">

      <div class="login-form-site">fynnhofmann.com</div>
      <h2 class="login-form-title">Anmelden</h2>
      <p class="login-form-sub">Benutzername und Passwort eingeben, um fortzufahren.</p>

      <form id="loginForm" autocomplete="off" novalidate>

        <div class="lf-field">
          <label for="username">Benutzername</label>
          <input type="text" id="username" name="username" class="lf-input"
                 autocomplete="username" placeholder="Benutzername" required spellcheck="false">
        </div>

        <div class="lf-field">
          <label for="password">Passwort</label>
          <div class="lf-pw-wrap">
            <input type="password" id="password" name="password" class="lf-input"
                   autocomplete="current-password" placeholder="Passwort" required
                   style="padding-right: 38px">
            <button type="button" class="lf-pw-toggle" id="pwToggle" aria-label="Passwort anzeigen">
              <svg id="iconEye" width="16" height="16" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              <svg id="iconEyeOff" width="16" height="16" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                   style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8
                         a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8
                         a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="lf-msg" id="loginError" role="alert" aria-live="polite"></div>

        <button type="submit" class="lf-submit" id="loginSubmit">Anmelden</button>

      </form>

      <hr class="lf-sep">
      <a href="index.html" class="lf-back">&larr; Zur&uuml;ck zur Website</a>
    </div>
  </div>

</div>

<script>
  var CORRECT_USER = 'fynnhofmann';
  var CORRECT_HASH = 'c920ef6facaefacc34dfc991b6551be145eb444e58c15e57b9783c4a7adc7569';
  var SESSION_KEY  = 'fh_auth';
  var SESSION_VAL  = 'fh_authed_2026';

  async function sha256(str) {
    var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  var pwField = document.getElementById('password');
  var toggle  = document.getElementById('pwToggle');
  var iconEye = document.getElementById('iconEye');
  var iconOff = document.getElementById('iconEyeOff');

  toggle.addEventListener('click', function () {
    var show = pwField.type === 'password';
    pwField.type = show ? 'text' : 'password';
    iconEye.style.display = show ? 'none' : '';
    iconOff.style.display = show ? ''     : 'none';
    pwField.focus();
  });

  document.getElementById('loginForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    var btn = document.getElementById('loginSubmit');
    var err = document.getElementById('loginError');
    btn.disabled    = true;
    btn.textContent = 'Wird gepr\u00fcft\u2026';
    err.textContent = '';
    err.className   = 'lf-msg';

    var user = document.getElementById('username').value.trim();
    var pass = document.getElementById('password').value;

    var [hash] = await Promise.all([
      sha256(pass),
      new Promise(r => setTimeout(r, 400))
    ]);

    if (user === CORRECT_USER && hash === CORRECT_HASH) {
      sessionStorage.setItem(SESSION_KEY, SESSION_VAL);
      window.location.replace('secure/index.html');
    } else {
      err.className   = 'lf-msg is-err';
      err.textContent = 'Benutzername oder Passwort falsch.';
      var wrap = document.getElementById('loginWrap');
      wrap.classList.add('lf-shake');
      wrap.addEventListener('animationend', function () {
        wrap.classList.remove('lf-shake');
      }, { once: true });
      btn.disabled    = false;
      btn.textContent = 'Anmelden';
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  });

  if (new URLSearchParams(location.search).get('logout') === '1') {
    var err       = document.getElementById('loginError');
    err.className   = 'lf-msg is-ok';
    err.textContent = 'Abmeldung erfolgreich.';
  }
</script>

</body>
</html>
