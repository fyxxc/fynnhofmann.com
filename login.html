<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anmelden – fynnhofmann.com</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      background: #fff;
      color: #1d1d1f;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    }
    .lw { max-width: 640px; margin: 18vh auto; padding: 0 28px; }
    .lw-domain { font-size: .85rem; color: #6e6e73; margin-bottom: 18px; }
    .lw h1 { font-size: 1.7rem; font-weight: 500; letter-spacing: -0.01em; margin: 0 0 32px; }
    .lw-field { margin-bottom: 14px; }
    .lw-field label { display: block; font-size: .8rem; color: #6e6e73; margin-bottom: 6px; }
    .lw-input {
      width: 100%; box-sizing: border-box;
      padding: 10px 14px;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      font-family: inherit;
      font-size: .95rem;
      color: #1d1d1f;
      background: #fff;
      outline: none;
      transition: border-color .15s;
    }
    .lw-input:focus { border-color: #06c; }
    .lw-pw-wrap { position: relative; }
    .lw-pw-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: #6e6e73; padding: 0;
    }
    .lw-error { font-size: .85rem; color: #ff3b30; margin: 10px 0; min-height: 18px; }
    .lw-submit {
      margin-top: 8px;
      padding: 10px 24px;
      background: #1d1d1f;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: .95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s;
    }
    .lw-submit:hover { background: #3a3a3c; }
    .lw-submit:disabled { opacity: .5; cursor: default; }
    .lw-back { display: block; margin-top: 28px; font-size: .8rem; color: #6e6e73; text-decoration: none; }
    .lw-back:hover { color: #1d1d1f; }
    @keyframes shake {
      0%,100% { transform: none; }
      20%,60%  { transform: translateX(-6px); }
      40%,80%  { transform: translateX(6px); }
    }
    .lw-shake { animation: shake .35s ease; }
  </style>

  <script>
    if (sessionStorage.getItem('fh_auth') === 'fh_authed_2026') {
      document.location.replace('secure/index.html');
    }
  </script>
</head>
<body>

  <div class="lw" id="loginWrap">
    <div class="lw-domain">fynnhofmann.com</div>
    <h1>Anmelden.</h1>

    <form id="loginForm" autocomplete="off" novalidate>

      <div class="lw-field">
        <label for="username">Benutzername</label>
        <input type="text" id="username" name="username" class="lw-input"
               autocomplete="username" placeholder="Benutzername" required spellcheck="false">
      </div>

      <div class="lw-field">
        <label for="password">Passwort</label>
        <div class="lw-pw-wrap">
          <input type="password" id="password" name="password" class="lw-input"
                 autocomplete="current-password" placeholder="Passwort" required
                 style="padding-right:42px">
          <button type="button" class="lw-pw-toggle" id="pwToggle"
                  aria-label="Passwort anzeigen/verbergen">
            <svg id="iconEye" width="18" height="18" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg id="iconEyeOff" width="18" height="18" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round"
                 style="display:none">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="lw-error" id="loginError" role="alert" aria-live="polite"></div>

      <button type="submit" class="lw-submit" id="loginSubmit">Anmelden</button>
    </form>

    <a href="index.html" class="lw-back">← Zurück zur Website</a>
  </div>

  <script>
    var CORRECT_USER = 'fynnhofmann';
    var CORRECT_HASH = 'c920ef6facaefacc34dfc991b6551be145eb444e58c15e57b9783c4a7adc7569';
    var SESSION_KEY  = 'fh_auth';
    var SESSION_VAL  = 'fh_authed_2026';

    async function sha256(str) {
      var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    var pwField = document.getElementById('password');
    var toggle  = document.getElementById('pwToggle');
    var iconEye = document.getElementById('iconEye');
    var iconOff = document.getElementById('iconEyeOff');

    toggle.addEventListener('click', function() {
      var show = pwField.type === 'password';
      pwField.type = show ? 'text' : 'password';
      iconEye.style.display = show ? 'none' : '';
      iconOff.style.display = show ? '' : 'none';
      pwField.focus();
    });

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var btn = document.getElementById('loginSubmit');
      var err = document.getElementById('loginError');
      btn.disabled = true;
      btn.textContent = 'Überprüfe …';
      err.textContent = '';

      var user = document.getElementById('username').value.trim();
      var pass = document.getElementById('password').value;

      var [hash] = await Promise.all([
        sha256(pass),
        new Promise(r => setTimeout(r, 420))
      ]);

      if (user === CORRECT_USER && hash === CORRECT_HASH) {
        sessionStorage.setItem(SESSION_KEY, SESSION_VAL);
        window.location.replace('secure/index.html');
      } else {
        err.textContent = 'Benutzername oder Passwort falsch.';
        var wrap = document.getElementById('loginWrap');
        wrap.classList.add('lw-shake');
        wrap.addEventListener('animationend', function() {
          wrap.classList.remove('lw-shake');
        }, { once: true });
        btn.disabled = false;
        btn.textContent = 'Anmelden';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    });

    if (new URLSearchParams(location.search).get('logout') === '1') {
      var err = document.getElementById('loginError');
      err.style.color = '#34c759';
      err.textContent = 'Du wurdest erfolgreich abgemeldet.';
    }
  </script>

</body>
</html>
